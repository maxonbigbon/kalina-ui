<div class="kn-table" role="table">
  @if (columns().length === 0) {
    <div class="kn-table__empty">No columns</div>
  } @else {
    <div class="kn-table__header" role="row">
      @for (col of columns(); track col) {
        <div class="kn-table__cell kn-table__cell--head" role="columnheader">{{ col }}</div>
      }
    </div>

    @if (rows().length === 0) {
      <div class="kn-table__empty">No data</div>
    } @else {
      <div class="kn-table__body" role="rowgroup">
        @for (row of rows(); track $index) {
          <div class="kn-table__row" role="row">
            @for (col of columns(); track col) {
              <div class="kn-table__cell" role="cell">{{ row[col] }}</div>
            }
          </div>
        }
      </div>
    }
  }
</div>
