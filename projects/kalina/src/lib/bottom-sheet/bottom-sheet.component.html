@if (currentHeight > 0) {
  <div class="kn-bottom-sheet__backdrop cdk-drag-boundary" (click)="close()">
    <section
      class="kn-bottom-sheet__panel"
      role="dialog"
      aria-modal="true"
      #sheetContainer
      cdkDrag
      cdkDragLockAxis="y"
      cdkDragBoundary=".cdk-drag-boundary"
      (cdkDragMoved)="onDragMoved($event)"
      (cdkDragEnded)="onDragEnded($event)"
      (click)="$event.stopPropagation()"
    >
      <header class="kn-bottom-sheet__header" cdkDragHandle>
        <div class="kn-bottom-sheet__grabber" aria-hidden="true"></div>
        <button type="button" class="kn-bottom-sheet__close" (click)="close()" aria-label="Close">
          ✕
        </button>
      </header>

      <div class="kn-bottom-sheet__content">
        <ng-content />
      </div>
    </section>
  </div>
}
