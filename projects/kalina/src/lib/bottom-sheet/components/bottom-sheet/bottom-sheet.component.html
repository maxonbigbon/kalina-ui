@if(knOutsideCreation) {
    <ng-container [ngTemplateOutlet]="contentTemplate"></ng-container>
}

<ng-template #contentTemplate>
    <kn-bottom-sheet-core
    [hasHandleIcon]="hasHandleIcon"
    [hasCloseIcon]="hasCloseIcon"
    [defaultHeight]="defaultHeight"
    [minHeight]="minHeight"
    [maxHeight]="maxHeight"
    (closed)="close()"
    >
        <ng-content select="[header]" slot="header"></ng-content>
        <ng-content slot="content"></ng-content>
        <ng-content select="[footer]" slot="footer"></ng-content>
    </kn-bottom-sheet-core>
</ng-template>
