
<ng-container [ngTemplateOutlet]="contentTemplate"></ng-container>

<ng-template #contentTemplate>
  <div class="bottom-sheet" 
      #sheet
      (touchstart)="onTouchStart($event)"
      (mousedown)="onMouseDown($event)"
      >

    <!-- Top bar: handle + close (independent) -->
    <div class="sheet-topbar">
      @if (hasHandleIcon) {
        <div class="sheet-handle" (mousedown)="onMouseDown($event)">
          <div class="handle-bar"></div>
        </div>
      }

      @if (hasCloseIcon) {
        <button
          type="button"
          class="sheet-close"
          aria-label="Close"
          (click)="close()"
          (mousedown)="$event.stopPropagation(); $event.preventDefault()"
          (touchstart)="$event.stopPropagation(); $event.preventDefault()"
        >
          <span aria-hidden="true">×</span>{{id}}
        </button>
      }
    </div>

    <!-- Header -->
    <div class="sheet-header">
      <ng-content select="[header]"></ng-content>
    </div>

    <!-- Content -->
    <div class="sheet-content" #content>
      <ng-content></ng-content>
    </div>

    <!-- Footer -->
    <div class="sheet-footer">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</ng-template>
