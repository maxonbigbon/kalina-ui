<div class="bottom-sheet" 
    #sheet
    (touchstart)="onTouchStart($event)"
    (mousedown)="onMouseDown($event)"
    >

  <!-- Top bar: handle + close (independent) -->
  <div class="sheet-topbar">
    @if (hasHandleIcon) {
      <div class="sheet-handle" (mousedown)="onMouseDown($event)">
        <div class="handle-bar"></div>
      </div>
    }

    @if (hasCloseIcon) {
      <button
        type="button"
        class="sheet-close"
        aria-label="Close"
        (click)="close()"
        (mousedown)="$event.stopPropagation(); $event.preventDefault()"
        (touchstart)="$event.stopPropagation(); $event.preventDefault()"
      >
        <span aria-hidden="true">×</span>
      </button>
    }
  </div>

  <!-- Header -->
  <div class="sheet-header">
    <ng-content select="[slot='header']"></ng-content>
  </div>

  <!-- Content -->
  <div class="sheet-content" #content>
    <ng-content select="[slot='content']"></ng-content>
  </div>

  <!-- Footer -->
  <div class="sheet-footer">
    <ng-content select="[slot='footer']"></ng-content>
  </div>
</div>
