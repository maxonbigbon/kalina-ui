<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__brand">{{ title() }}</div>

    <nav class="sidebar__nav" aria-label="Components">
      @for (item of nav(); track item.label) {
        <a class="sidebar__link" [routerLink]="item.route" routerLinkActive="is-active">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button class="theme-toggle" type="button" (click)="toggleTheme()">
        Theme: {{ theme() === 'light' ? 'Light' : 'Dark' }}
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
